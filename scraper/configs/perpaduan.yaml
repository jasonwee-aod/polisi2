# Unified scraper config for Perpaduan
# Kementerian Perpaduan Negara — CSS selector-driven HTML scraping
# Source: specific-scrapers/perpaduan-scraper/configs/perpaduan.yaml

site_slug: perpaduan
agency: "Kementerian Perpaduan Negara"
base_url: "https://www.perpaduan.gov.my"

allowed_hosts:
  - "www.perpaduan.gov.my"
  - "perpaduan.gov.my"

request_delay: 1.5
estimated_pages: 50

sections:

