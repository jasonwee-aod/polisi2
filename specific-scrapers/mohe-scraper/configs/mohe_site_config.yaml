# Metadata extraction rules
metadata:
  agency: "Ministry of Higher Education (MOHE)"
  language_map:
    en: "en"
    ms: "ms"
  doc_types:
    announcement: "announcement"
    press_release: "press_release"
    report: "report"
    speech: "speech"
    notice: "notice"
    statement: "press_release"
    circular: "circular"
    form: "form"
    manual: "manual"
    guideline: "guideline"
    other: "other"

# Date parsing hints
date_parsing:
  formats:
    - "%d %B %Y"          # 27 February 2026
    - "%d-%m-%Y"          # 27-02-2026
    - "%Y-%m-%d"          # 2026-02-27
    - "%d/%m/%Y"          # 27/02/2026
    - "%A, %d %B %Y"      # Thursday, 27 February 2026
  locales:
    ms:
      - "Januari"
      - "Februari"
      - "Mac"
      - "April"
      - "Mei"
      - "Jun"
      - "Julai"
      - "Ogos"
      - "September"
      - "Oktober"
      - "November"
      - "Disember"

# Crawl behavior
crawl:
  request_timeout: 30
  max_retries: 3
  retry_backoff_factor: 2
  batch_size: 50
  respect_robots_txt: true
  user_agent: "MOHEScraper/1.0 (+https://github.com/your-org/mohe-scraper)"

# Deduplication thresholds
dedup:
  url_match_weight: 1.0
  etag_match_weight: 0.9
  sha256_match_weight: 1.0
