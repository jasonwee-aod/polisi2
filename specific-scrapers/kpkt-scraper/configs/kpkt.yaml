site_slug: kpkt
agency: "Kementerian Perumahan dan Kerajaan Tempatan"
base_url: "https://www.kpkt.gov.my"

allowed_hosts:
  - "www.kpkt.gov.my"
  - "kpkt.gov.my"

sections:
  # ── Siaran Media (Press Releases) ─────────────────────────────────────────
  # Organized by year; each year is a separate listing page.
  # HTML: jQuery UI Accordion with month headers; PDFs at
  #       /kpkt/resources/user_1/media_akhbar/<YYYY>/<FILENAME>.pdf
  - name: siaran_media
    doc_type: press_release
    language: ms
    listing_pages:
      - url: "https://www.kpkt.gov.my/index.php/pages/view/3760?mid=765"
        label: "Siaran Media 2026"
      - url: "https://www.kpkt.gov.my/index.php/pages/view/3470?mid=764"
        label: "Siaran Media 2025"
      - url: "https://www.kpkt.gov.my/index.php/pages/view/2590?mid=732"
        label: "Siaran Media 2024"
      # Add earlier years here as needed, e.g.:
      # - url: "https://www.kpkt.gov.my/index.php/pages/view/<ID>?mid=<MID>"
      #   label: "Siaran Media 2023"

  # ── Muat Turun / Downloads Hub ────────────────────────────────────────────
  # /index.php/pages/view/1026 is a hub page. Its accordion links to 5 sub-pages:
  #   /88   → Senarai Perundangan (legislation: Acts, PU(A), regulations)
  #   /228  → Pengurusan Kualiti (quality management docs)
  #   /646  → Borang BKK – PPG & PPW (community credit control forms)
  #   /425  → Borang Tribunal Pengurusan Strata (strata tribunal forms)
  #   /326  → Borang Tribunal Tuntutan Pembeli Rumah (housing claims tribunal forms)
  #
  # page_type: hub → pipeline will crawl sub-pages automatically.
  # Download links use two schemes:
  #   - Direct: /kpkt/resources/user_1/...
  #   - Obfuscated: /index.php/dl/<hex(base64(path))>  → decoded to direct URL
  - name: muat_turun
    page_type: hub
    doc_type: legislation    # default; overridden per sub-page by extractor
    language: ms
    listing_pages:
      - url: "https://www.kpkt.gov.my/index.php/pages/view/1026"
        label: "Muat Turun Hub"

  # Sub-pages can also be targeted individually (useful for --dry-run testing):
  # - name: senarai_perundangan
  #   page_type: attachments
  #   doc_type: legislation
