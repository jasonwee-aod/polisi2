  #       label: "Borang Tribunal Pengurusan Strata"
  #     - url: "https://www.kpkt.gov.my/index.php/pages/view/326"
  #       label: "Borang Tribunal Tuntutan Pembeli Rumah"
  #
  # - name: borang_bkk
  #   page_type: attachments
  #   doc_type: form
  #   language: ms
  #   listing_pages:
  #     - url: "https://www.kpkt.gov.my/index.php/pages/view/646"
  #       label: "Borang BKK (PPG & PPW)"

  # ── Statistik KPKT (Annual & Quarterly Statistics) ────────────────────────
  # Hub: /index.php/pages/view/490?mid=661  (plain-page links, NOT accordion)
  #   Sub-page 700 → yearly stats 2017-2024 + 8 archive sub-pages (2009-2016)
  #   Sub-page 131 → Piagam Pelanggan monthly PDFs
  #   Sub-page 121 → Bilangan Transaksi Online monthly PDFs
  #
  # HTML archetype: <h3>YEAR</h3> headers + <a> in <td> thumbnail grid
  #   (no .container_attachments, no accordion → fallback whole-page scan used)
  # List archetype: <a> in <li> (piagam pelanggan, statistik online)
  # No /index.php/dl/ obfuscated links on any stats pages.
  # Dates extracted from title text: "Sehingga 31 Mac 2022" → 2022-03-31,
  #   "Bulan Januari 2026" → 2026-01-01, year-only "2024" → 2024-01-01.
  - name: statistik_kpkt
    page_type: attachments
    doc_type: report
    language: ms
    listing_pages:
      # Main page: covers 2017–2024 (annual + quarterly)
      - url: "https://www.kpkt.gov.my/index.php/pages/view/700?mid=586"
        label: "Statistik KPKT 2017-2024"
      # Archive sub-pages: one per year, 2009–2016
      - url: "https://www.kpkt.gov.my/index.php/pages/view/431"
        label: "Statistik KPKT 2016"
      - url: "https://www.kpkt.gov.my/index.php/pages/view/351"
        label: "Statistik KPKT 2015"
      - url: "https://www.kpkt.gov.my/index.php/pages/view/167"
        label: "Statistik KPKT 2014"
      - url: "https://www.kpkt.gov.my/index.php/pages/view/188"
        label: "Statistik KPKT 2013"
      - url: "https://www.kpkt.gov.my/index.php/pages/view/190"
        label: "Statistik KPKT 2012"
      - url: "https://www.kpkt.gov.my/index.php/pages/view/192"
        label: "Statistik KPKT 2011"
      - url: "https://www.kpkt.gov.my/index.php/pages/view/194"
        label: "Statistik KPKT 2010"
      - url: "https://www.kpkt.gov.my/index.php/pages/view/196"
        label: "Statistik KPKT 2009"

  # ── Piagam Pelanggan (Customer Charter Achievement Statistics) ─────────────
  # HTML: <a> in <li> list, monthly PDFs at
  #       /kpkt/resources/user_1/Attachments/piagam_pelanggan/YYYY/
  - name: piagam_pelanggan
    page_type: attachments
    doc_type: report
    language: ms
    listing_pages:
      - url: "https://www.kpkt.gov.my/index.php/pages/view/131"
        label: "Piagam Pelanggan (Current)"
      - url: "https://www.kpkt.gov.my/index.php/pages/view/137"
        label: "Piagam Pelanggan (Archive)"

  # ── Statistik Perkhidmatan Dalam Talian (Online Services Stats) ────────────
  # HTML: <a> in <li> list, monthly PDFs at
  #       /kpkt/resources/user_1/Attachments/statistik_online/YYYY/
  # Note: Last updated 2021-11-10 – may be discontinued.
  - name: statistik_online
    page_type: attachments
    doc_type: report
    language: ms
    listing_pages:
      - url: "https://www.kpkt.gov.my/index.php/pages/view/121"
        label: "Statistik Online (Current)"
      - url: "https://www.kpkt.gov.my/index.php/pages/view/128"
        label: "Statistik Online (Archive)"

